name: E2E Pilot Smoke

on:
  pull_request:
    paths:
      - "src/backend/**"
      - "apps/web/**"
      - "infra/**"
      - "scripts/smoke-e2e.ps1"
      - "docker-compose.yml"
      - ".github/workflows/e2e.yml"
  push:
    branches: [master]
    paths:
      - "src/backend/**"
      - "apps/web/**"
      - "infra/**"
      - "scripts/smoke-e2e.ps1"
      - "docker-compose.yml"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pilot-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build and start smoke stack
        run: docker compose --env-file .env.example --project-name wms-smoke --file docker-compose.smoke.yml up --detach --build --wait --wait-timeout 300
      - name: Execute inbound, outbound and tenant-isolation smoke
        shell: pwsh
        run: ./scripts/smoke-e2e.ps1 -TimeoutSeconds 180
      - name: Capture diagnostics
        if: failure()
        run: docker compose --env-file .env.example --project-name wms-smoke --file docker-compose.smoke.yml logs --no-color --tail 250
      - name: Stop pilot stack
        if: always()
        run: docker compose --env-file .env.example --project-name wms-smoke --file docker-compose.smoke.yml down --volumes --remove-orphans
