name: Traceability CI

on:
  pull_request:
    paths: ["docs/**", "scripts/validate-traceability.ps1", ".github/workflows/traceability.yml"]
  push:
    branches: [master]
    paths: ["docs/**", "src/**", "apps/**", "tests/**"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: ./scripts/validate-traceability.ps1
