name: Documentation CI

on:
  pull_request:
    paths: ["docs/**", "scripts/validate-docs.ps1", ".github/workflows/docs.yml"]
  push:
    branches: [master]
    paths: ["docs/**"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: ./scripts/validate-docs.ps1
